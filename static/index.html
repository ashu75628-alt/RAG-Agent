<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0F1729;
            color: #F7F5F0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 30px;
            border-bottom: 1px solid #2A3349;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 24px;
            color: #C9A961;
            font-family: Georgia, serif;
        }

        header p {
            font-size: 13px;
            color: #8A8578;
            margin-top: 2px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .user .avatar { background: #E07856; }
        .assistant .avatar { background: #C9A961; }

        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
        }

        .user .bubble {
            background: #1A2236;
            border-top-right-radius: 4px;
            color: #F7F5F0;
        }

        .assistant .bubble {
            background: #161D2E;
            border-top-left-radius: 4px;
            color: #C9C5BC;
            border: 1px solid #2A3349;
        }

        .sources {
            font-size: 12px;
            color: #8A8578;
            margin-top: 8px;
            border-left: 2px solid #C9A961;
            padding-left: 10px;
        }

        #input-area {
            padding: 16px 30px;
            border-top: 1px solid #2A3349;
            display: flex;
            gap: 12px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        #user-input {
            flex: 1;
            background: #161D2E;
            border: 1px solid #2A3349;
            border-radius: 12px;
            padding: 12px 16px;
            color: #F7F5F0;
            font-size: 14px;
            outline: none;
            font-family: 'Segoe UI', sans-serif;
        }

        #user-input:focus {
            border-color: #C9A961;
        }

        #send-btn {
            background: #C9A961;
            color: #0F1729;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        #send-btn:hover { background: #B8954F; }
        #send-btn:disabled { background: #2A3349; color: #8A8578; cursor: not-allowed; }

        .typing {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #C9A961;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        pre {
            background: #0A1020;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }

        code { font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 32px">📚</div>
    <div>
        <h1>Papa AI</h1>
        <p>Ask anything — grounded in your documents, backed by the web when needed.</p>
    </div>
</header>

<div id="chat-container"></div>

<div style="max-width: 800px; width: 100%; margin: 0 auto; padding: 0 30px;">
    <div id="input-area" style="padding: 16px 0;">
        <input 
            type="text" 
            id="user-input" 
            placeholder="Ask something..." 
            onkeypress="if(event.key==='Enter') sendMessage()"
        />
        <button id="send-btn" onclick="sendMessage()">Send ➤</button>
    </div>
</div>

<script>
    let chatHistory = [];

    function addMessage(role, content) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `message ${role}`;

        const avatar = role === 'user' ? '🧑' : '📖';

        // Parse sources from content
        let mainContent = content;
        let sourcesHtml = '';

        if (content.includes('📚 **Sources:**')) {
            const parts = content.split('---\n📚 **Sources:**\n');
            mainContent = parts[0];
            if (parts[1]) {
                sourcesHtml = `<div class="sources">📚 Sources: ${parts[1].replace(/\n/g, ' ')}</div>`;
            }
        }

        // Simple markdown-like formatting
        mainContent = mainContent
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
            .replace(/`(.*?)`/g, '<code>$1</code>')
            .replace(/\n/g, '<br>');

        div.innerHTML = `
            <div class="avatar">${avatar}</div>
            <div class="bubble">${mainContent}${sourcesHtml}</div>
        `;

        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function addTyping() {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.id = 'typing-indicator';
        div.innerHTML = `
            <div class="avatar">📖</div>
            <div class="bubble">
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            </div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
        const typing = document.getElementById('typing-indicator');
        if (typing) typing.remove();
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const message = input.value.trim();
        if (!message) return;

        input.value = '';
        btn.disabled = true;

        addMessage('user', message);
        addTyping();

        chatHistory.push({ role: 'user', content: message });

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message,
                    history: chatHistory.slice(-20)
                })
            });

            const data = await response.json();
            removeTyping();

            const botReply = data.response || data.error || 'Something went wrong!';
            addMessage('assistant', botReply);
            chatHistory.push({ role: 'assistant', content: botReply });

        } catch (err) {
            removeTyping();
            addMessage('assistant', 'Connection error. Please try again!');
        }

        btn.disabled = false;
        input.focus();
    }

    // Welcome message
    window.onload = () => {
        addMessage('assistant', 'Hey! I am Papa AI 📚 Ask me anything — I will search your documents first, and if needed, search the web too!');
    };
</script>

</body>
</html>
